# Conda environment for py_ntcpx v3.0.x
# Create: conda env create -f environment.yml
# Update: conda env update -f environment.yml --prune

name: py_ntcpx
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.9,<3.13
  - numpy>=1.20.0,<2.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  - scikit-learn>=0.24.0
  - matplotlib>=3.3.0
  - seaborn
  - pyyaml
  - pip
  - pip:
    - xgboost>=1.5.0
    - openpyxl
    - xlsxwriter
    - python-docx
    - shap
    - lime
    - joblib>=1.0.0
    - pytest>=6.0
